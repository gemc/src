experiment: examples
runno: 1
nthreads: 1

verbosity:
  - g4system: 1
  - gemc: 1

gsystem:
  - name: cherenkov
    variation: CO2

gstreamer:
  - format: csv
    filename: cherenkov
  - format: root
    filename: cherenkov

phys_list: FTFP_BERT + G4OpticalPhysics

gparticle:
  - name: e-
    p: 1000
    vz: -50

# Required for optical-photon flux hits because optical photons deposit zero energy.
recordZeroEdep: true


