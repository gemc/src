experiment: examples
runno: 1
n: 5
nthreads: 1

# Required for optical-photon flux hits because optical photons deposit zero energy.
recordZeroEdep: true

gparticle:
  - name: e-
    p: 1000
    vz: -50
    delta_theta: 20
    delta_phi: 180

gsystem:
  - name: cherenkov

gstreamer:
  - format: csv
    filename: out
  - format: root
    filename: out

phys_list: FTFP_BERT + G4OpticalPhysics
