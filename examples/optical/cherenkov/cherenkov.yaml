experiment: examples
runno: 1
n: 100
nthreads: 1

# Required for optical-photon flux hits because optical photons deposit zero energy.
recordZeroEdep: true

gparticle:
  - name: e-
    p: 1000
    vz: -50

gsystem:
  - name: cherenkov
    variation: CO2

gstreamer:
  - format: csv
    filename: CO2
  - format: root
    filename: CO2

phys_list: FTFP_BERT + G4OpticalPhysics
