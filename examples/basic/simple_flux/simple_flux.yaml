experiment: examples
runno: 1
nthreads: 1
show_field_lines: 0
show_auxiliary_edges: false

gsystem:
  - name: simple_flux
    factory: sqlite

gstreamer:
  - format: csv
    filename: simple_flux

phys_list: QBBC

g4camera:
  theta: 108*deg
  phi: 165*deg

gparticle:
  - name: proton
    p: 2000*MeV
    vz: -3*cm
    delta_vx: 0.1*cm
    delta_vy: 0.1*cm
    multiplicity: 10
