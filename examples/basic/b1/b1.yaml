experiment: examples
runno: 1
nthreads: 1
show_field_lines: 0
show_auxiliary_edges: false

gsystem:
  - name: b1
    factory: sqlite

gstreamer:
  - format: csv
    filename: b1

phys_list: QBBC

g4camera:
  theta: 90*deg
  phi: 180*deg

gparticle:
  - name: gamma
    p: 6*MeV
    vz: -15*cm
    delta_vx: 4*cm
    delta_vy: 4*cm
    multiplicity: 1
