experiment: examples
runno: 1
nthreads: 1

verbosity:
  - g4system: 1
  - gemc: 1

gsystem:
  - name: b1
    factory: sqlite

gstreamer:
  - format: csv
    filename: CO2
  - format: root
    filename: CO2

phys_list: QBBC

g4view:
  segsPerCircle: 100

g4camera:
  theta: 120*deg
  phi: 150*deg

gparticle:
  - name: gamma
    p: 6*MeV
    vz: -15*cm
    delta_vx: 4*cm
    delta_vy: 4*cm
    multiplicity: 1
