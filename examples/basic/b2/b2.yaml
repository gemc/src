experiment: examples
runno: 1
nthreads: 1

gsystem:
  - name: b2
    factory: sqlite

gstreamer:
  - format: csv
    filename: b2

phys_list: FTFP_BERT

g4camera:
  theta: 116*deg
  phi: 160*deg

gparticle:
  - name: proton
    p: 3000*MeV
    vz: -250*cm

gmultipoles:
  - name: dipole
    pole_number: 2
    strength: 2
    rotaxis: z
    rotation_angle: "30*deg"

root: G4Box, 12*cm, 12*cm, 18*cm, G4_WATER
