experiment: examples
runno: 1
n: 1
nthreads: 4

gparticle:
  - name: proton
    p: 3000
    vz: -250

verbosity:
  - gfield: 1

debug:
  - gfield: true

gsystem:
  - name: b2
    factory: sqlite

gmultipoles:
  - name: dipole
    pole_number: 2
    strength: 2
    rotaxis: z
    rotation_angle: "30*deg"

gstreamer:
  - format: ascii
    filename: out
  - format: root
    filename: out

root: G4Box, 12*cm, 12*cm, 18*cm, G4_WATER
phys_list: FTFP_BERT