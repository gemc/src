# CAD organ dosimeters: heart, lungs, liver.
#
# Uploaded into gemc.db by ../cad.py (pygemc upload_cad_definitions). Each entry becomes a
# solid=CAD geometry row whose mesh (the *_NIH3D.stl file with the same stem) is loaded by the
# GEMC CAD factory. The three organs are sensitive detectors of type "dosimeter", which records
# the deposited energy and the dose (edep / mass) per organ.
#
# `system` must match both the gsystem name in ../cad.yaml and the directory holding the meshes
# (here: stls). The three source meshes come from NIH 3D at three unrelated scales, so each has
# its own uniform `scale` (mesh-units -> mm). Meshes are placed as authored (no recentering), so
# `position` targets a plausible torso layout (z up, x patient-left, y anterior) accounting for
# each mesh's native origin. Open the geometry in the pyvista viewer to fine-tune scale,
# position and rotation for the specific meshes.

system:     stls
experiment: examples
variation:  default
run:        1
cad_dir:    stls
extension:  stl

defaults:
  material:     G4_TISSUE_SOFT_ICRP   # ICRP soft tissue
  digitization: dosimeter             # sensitive detector: records edep and dose = edep / mass
  style:        0                     # draw as wireframe (0 = wireframe, 1 = solid)

volumes:
  - name:       heart_NIH3D
    material:   G4_BLOOD_ICRP
    color:      c81e1e                     # crimson
    scale:      130                        # native longest side ~1 unit -> ~130 mm
    position:   30*mm, 40*mm, 0*mm         # nestled between the lungs, patient-left/anterior
    identifier: "organ: 1"

  - name:       respiratory_NIH3D
    material:   G4_LUNG_ICRP
    color:      f2a0a0                      # pale pink
    opacity:    0.55                        # translucent so the heart is visible inside
    scale:      9.817                       # native longest side ~28.5 units -> ~280 mm
    position:   -128.4*mm, -140.0*mm, -95.7*mm   # recenters the lungs on the torso origin
    identifier: "organ: 2"

  - name:       liver_NIH3D
    material:   G4_TISSUE_SOFT_ICRP
    color:      8b5a2b                           # brown
    scale:      640.9                            # empirically set
    position:   100.0*mm, -382.3*mm, -50*mm   # empirically setbelow the lungs, toward the patient-right
    identifier: "organ: 3"
