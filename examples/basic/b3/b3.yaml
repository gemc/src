experiment: examples
runno: 1
n: 1
nthreads: 4
show_field_lines: 0
show_auxiliary_edges: false

gparticle:
  - name: e-
    p: 1500*MeV
    theta: 23*deg
    delta_theta: 4*deg
    delta_phi: 18*deg
    multiplicity: 1


verbosity:
  - ghits: 0
  - gsystem: 0
  - gfield: 1
  - gemc: 0

debug:
  - gfield: true

gsystem:
  - name: b3
    factory: sqlite

gmultipoles:
  - name: dipole
    pole_number: 2
    strength: 2
    rotaxis: z
    rotation_angle: "30*deg"

root: G4Box, 12*cm, 12*cm, 18*cm, G4_WATER
phys_list: QBBC
