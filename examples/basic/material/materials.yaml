experiment: examples
runno: 1
nthreads: 1

verbosity:
  - g4system: 1
  - gemc: 1

gsystem:
  - name: material
    factory: sqlite

gstreamer:
  - format: csv
    filename: material
  - format: root
    filename: material

phys_list: FTFP_BERT + G4OpticalPhysics

g4camera:
  theta: 120*deg
  phi: 150*deg

gparticle:
  - name: proton
    p: 2000*MeV
    vz: -3*cm
    delta_vx: 0.1*cm
    delta_vy: 0.1*cm
    multiplicity: 1
