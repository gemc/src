experiment: examples
runno: 1
nthreads: 1
show_field_lines: 0
show_auxiliary_edges: false

gsystem:
  - name: material
    factory: sqlite

gstreamer:
  - format: csv
    filename: material

phys_list: FTFP_BERT + G4OpticalPhysics

g4camera:
  theta: 120*deg
  phi: 150*deg

g4view:
  cloudPoints: 10000

gparticle:
  - name: proton
    p: 2000*MeV
    vz: -2*cm
    delta_vx: 0.1*cm
    delta_vy: 0.1*cm
    multiplicity: 1
