<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background: fill="#aaddff" replaced at render time (none = unselected, highlight = selected) -->
    <rect x="6" y="6" width="36" height="36" rx="3" fill="#aaddff" stroke="currentColor" stroke-width="1"/>

    <!-- Front face — visible, solid -->
    <rect x="11" y="14" width="12" height="8"
          fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- Back face — hidden, dashed -->
    <rect x="20" y="12" width="12" height="8"
          fill="none" stroke="currentColor" stroke-width="1"
          stroke-dasharray="2,1.5" stroke-linejoin="round"/>
    <!-- Visible depth edges -->
    <line x1="11" y1="14" x2="20" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="23" y1="14" x2="32" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="23" y1="22" x2="32" y2="20" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Hidden depth edge — dashed -->
    <line x1="11" y1="22" x2="20" y2="20" stroke="currentColor" stroke-width="1"
          stroke-dasharray="2,1.5" stroke-linecap="round"/>

    <!-- Label row 1 -->
    <text x="24" y="31" font-size="7.5" text-anchor="middle"
          font-family="Arial" fill="currentColor" font-weight="500">Hidden</text>
    <!-- Label row 2 -->
    <text x="24" y="38" font-size="7.5" text-anchor="middle"
          font-family="Arial" fill="currentColor" font-weight="500">Lines</text>
</svg>
