<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background: fill="#aaddff" replaced at render time (none = unselected, highlight = selected) -->
    <rect x="6" y="6" width="36" height="36" rx="3" fill="#aaddff" stroke="currentColor" stroke-width="1"/>

    <!-- Left half: aliased staircase (4 steps, 2.5×2.5 each) -->
    <rect x="11"  y="19.5" width="2.5" height="2.5" fill="currentColor"/>
    <rect x="13.5" y="17"  width="2.5" height="2.5" fill="currentColor"/>
    <rect x="16"  y="14.5" width="2.5" height="2.5" fill="currentColor"/>
    <rect x="18.5" y="12"  width="2.5" height="2.5" fill="currentColor"/>

    <!-- Centre divider -->
    <line x1="25" y1="12" x2="25" y2="22"
          stroke="currentColor" stroke-width="0.8"
          stroke-dasharray="2,1.5" opacity="0.5"/>

    <!-- Right half: smooth anti-aliased diagonal -->
    <line x1="27" y1="22" x2="37" y2="12"
          stroke="currentColor" stroke-width="2"
          stroke-linecap="round"/>

    <!-- Label row 1 -->
    <text x="24" y="31" font-size="7.5" text-anchor="middle"
          font-family="Arial" fill="currentColor" font-weight="500">Anti</text>
    <!-- Label row 2 -->
    <text x="24" y="38" font-size="7.5" text-anchor="middle"
          font-family="Arial" fill="currentColor" font-weight="500">Aliasing</text>
</svg>
