name: Sanitize

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Re-run the test suite up to this many times before declaring failure.
  GEMC_TEST_MAX_ATTEMPTS: 3

concurrency:
  group: sanitize-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "**/*.md"

  merge_group:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"

jobs:
  discover:
    name: Create job matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_sanitize: ${{ steps.scan.outputs.matrix_sanitize }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: scan
        name: Build matrix
        shell: bash
        run: |
          set -euo pipefail
          ./ci/distros_tags.sh

      - name: Fail if matrix is empty
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ steps.scan.outputs.matrix_sanitize }}" ]]; then
            echo "matrix_sanitize output is empty. Check ci/distros_tags.sh writing to GITHUB_OUTPUT."
            exit 1
          fi

      - name: Show matrix (debug)
        shell: bash
        run: |
          echo '${{ steps.scan.outputs.matrix_sanitize }}'

  build-with-sanitizer:
    name: ${{ matrix.image }}/${{ matrix.image_tag }} ${{ matrix.arch }} ${{ matrix.sanitizer }}
    needs: [ discover ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix_sanitize) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and test
        shell: bash
        env:
          GEMC_SKIP_PYTHON_ENV_INSTALL: "1"
        run: |
          set -euo pipefail
          export DOCKER_ENTRYPOINT_SOURCE_ONLY=1
          . /usr/local/bin/docker-entrypoint.sh
          module load geant4/"${{ matrix.geant4_tag }}"
          ./ci/build.sh "${{ matrix.sanitizer }}"

      - name: Package sanitizer logs
        if: ${{ always() }} # run regardless of earlier step outcomes
        shell: bash
        run: |
          set -euo pipefail
          echo "LOG_TAR=" >> "$GITHUB_ENV"
          src="/root/src/logs"
          outdir="$GITHUB_WORKSPACE/_artifacts"
          tarball="logs-${{ matrix.image }}-${{ matrix.arch }}-${{ matrix.sanitizer }}.tgz"
          mkdir -p "$outdir"

          if [[ -d "$src" ]]; then
            tar -C "/root/src" -czf "$outdir/$tarball" "logs"
            echo "LOG_TAR=$outdir/$tarball" >> "$GITHUB_ENV"
            echo "Packaged logs from $src"
          else
            echo "No logs directory at $src"
          fi

      - name: Upload sanitizer logs (artifact)
        if: ${{ always() && env.LOG_TAR != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ matrix.image }}-${{ matrix.arch }}-${{ matrix.sanitizer }}
          path: ${{ env.LOG_TAR }}
          if-no-files-found: warn
          retention-days: 14

  build-with-sanitizer-final:
    name: Sanitize - summary
    if: ${{ always() }} # run regardless of earlier step outcomes
    needs: [ build-with-sanitizer ]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix entry failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "### Some sanitizer jobs failed or were cancelled." >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Pass
        run: |
          echo "### All sanitizer jobs passed." >> $GITHUB_STEP_SUMMARY
