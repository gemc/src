# Build and test GEMC images without publishing containers.
name: Test

permissions:
  contents: read
  packages: read

env:
  GEMC_TAG: dev
  GEANT4_TAG: 11.4.1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_BUILD_SUMMARY: false

concurrency:
  group: gemc-test-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "**/*.md"

  merge_group:
  push:
    branches: [ main ]
    tags: [ '*' ]
    paths-ignore:
      - "**/*.md"

jobs:
  discover:
    name: Create Job Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_build: ${{ steps.scan.outputs.matrix_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: scan
        name: Build matrix
        run: ci/distros_tags.sh

  build:
    name: ${{ matrix.image }}/${{ matrix.image_tag }} ${{ matrix.arch }}
    needs: [ discover ]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix_build) }}
    env:
      CACHE_REF: type=registry,ref=ghcr.io/${{ github.repository }}:cache-test-${{ matrix.arch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free up disk space
        uses: ./.github/actions/free-disk-space
        with:
          prune_docker: "true"
          show_tree: "true"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dockerfile
        shell: bash
        run: |
          python3 ci/dockerfile_creator.py \
            -i "${{ matrix.image }}" \
            -t "${{ matrix.image_tag }}" \
            --gemc-version "${{ matrix.gemc_tag || env.GEMC_TAG }}" \
            --geant4-version "${{ matrix.geant4_tag || env.GEANT4_TAG }}" \
            --source context \
            > Dockerfile.generated
          cat Dockerfile.generated

      - name: Build and test
        uses: docker/build-push-action@v7
        with:
          pull: true
          context: .
          file: ./Dockerfile.generated
          target: final
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: ${{ env.CACHE_REF }}

      - name: Export logs
        uses: docker/build-push-action@v7
        with:
          pull: true
          context: .
          file: ./Dockerfile.generated
          target: logs-export
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: ${{ env.CACHE_REF }}
          outputs: type=local,dest=${{ runner.temp }}/artifacts/${{ matrix.logs_dir }}

      - name: Pack logs
        shell: bash
        run: |
          set -euo pipefail
          echo "LOG_TAR=" >> "$GITHUB_ENV"
          LOGROOT="${{ runner.temp }}/artifacts/${{ matrix.logs_dir }}"
          TAR="logs-${{ matrix.gemc_tag }}-${{ matrix.image }}-${{ matrix.image_tag }}"
          TAR="${TAR}-${{ matrix.arch }}.tgz"
          if [[ -d "$LOGROOT/logs" ]]; then
            cd "$LOGROOT"
            tar -czf "$TAR" logs
            echo "LOG_TAR=$LOGROOT/$TAR" >> "$GITHUB_ENV"
          else
            echo "No exported logs found at $LOGROOT/logs"
          fi

      - name: Upload logs
        if: ${{ env.LOG_TAR != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ matrix.gemc_tag }}-${{ matrix.image }}-${{ matrix.image_tag }}-${{ matrix.arch }}
          path: ${{ env.LOG_TAR }}
          if-no-files-found: warn
          retention-days: 14

  final:
    name: Test - summary
    if: ${{ always() }}
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "### Some GEMC test jobs failed or were cancelled." >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Pass
        run: |
          echo "### GEMC test workflow passed." >> "$GITHUB_STEP_SUMMARY"
