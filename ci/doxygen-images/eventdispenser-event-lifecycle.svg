<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc">
  <title id="title">What happens inside an allocated event</title>
  <desc id="desc">
Run-dependent setup happens once, then Geant4 and GEMC process each event
through a fixed lifecycle.
  </desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5">
      <polygon points="0 0, 9 3.5, 0 7" fill="#66717d" />
    </marker>
    <style>.background { fill: #ffffff; }
.panel { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
.panel-dashed { fill: #f6f8fa; stroke: #8c959f; stroke-dasharray: 7 5; stroke-width: 1.5; }
.title { fill: #1f2328; font: 700 23px Avenir, "Segoe UI", Arial, sans-serif; }
.subtitle { fill: #59636e; font: 13px Avenir, "Segoe UI", Arial, sans-serif; }
.heading { fill: #1f2328; font: 700 15px Avenir, "Segoe UI", Arial, sans-serif; }
.label { fill: #1f2328; font: 13px Avenir, "Segoe UI", Arial, sans-serif; }
.small { fill: #59636e; font: 11.5px Avenir, "Segoe UI", Arial, sans-serif; }
.tiny { fill: #59636e; font: 10.5px Avenir, "Segoe UI", Arial, sans-serif; }
.center { text-anchor: middle; }
.end { text-anchor: end; }
.axis { fill: none; stroke: #66717d; stroke-width: 1.5; }
.grid { fill: none; stroke: #d0d7de; stroke-width: 1; }
.arrow { fill: none; stroke: #66717d; stroke-width: 2; marker-end: url(#arrow); }
.blue { fill: #dbeafe; stroke: #1d6ff2; stroke-width: 1.5; }
.green { fill: #dcfce7; stroke: #238636; stroke-width: 1.5; }
.gold { fill: #fff3cd; stroke: #b77900; stroke-width: 1.5; }
.red { fill: #ffe4e0; stroke: #c2412d; stroke-width: 1.5; }
.violet { fill: #eee5ff; stroke: #8250df; stroke-width: 1.5; }
.blue-line { fill: none; stroke: #1d6ff2; stroke-width: 3; }
.green-line { fill: none; stroke: #238636; stroke-width: 3; }
.gold-line { fill: none; stroke: #b77900; stroke-width: 3; }
.red-line { fill: none; stroke: #c2412d; stroke-width: 3; }
.muted-line { fill: none; stroke: #8c959f; stroke-width: 1.5; stroke-dasharray: 5 4; }
.table-head { fill: #eaeef2; stroke: #afb8c1; stroke-width: 1; }
.table-cell { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
@media (prefers-color-scheme: dark) {
  .background { fill: #0d1117; }
  .panel, .panel-dashed { fill: #161b22; stroke: #30363d; }
  .title, .heading, .label { fill: #e6edf3; }
  .subtitle, .small, .tiny { fill: #9da7b3; }
  .axis, .arrow { stroke: #8b949e; }
  .grid { stroke: #30363d; }
  .blue { fill: #15243a; stroke: #58a6ff; }
  .green { fill: #173326; stroke: #3fb950; }
  .gold { fill: #352b18; stroke: #d29922; }
  .red { fill: #3a211d; stroke: #f47067; }
  .violet { fill: #2d2340; stroke: #a371f7; }
  .table-head { fill: #21262d; stroke: #484f58; }
  .table-cell { fill: #161b22; stroke: #30363d; }
}</style>
  </defs>
  <rect class="background" width="1000" height="470" />
  <text class="title" x="30" y="38">What happens inside an allocated event</text>
  <text class="subtitle" x="30" y="64">
    <tspan x="30">Run-dependent setup happens once, then Geant4 and GEMC process each event</tspan>
    <tspan x="30" dy="15">through a fixed lifecycle.</tspan>
  </text>
  <rect class="gold" x="30" y="90" width="940" height="72" rx="6" />
  <text class="heading" x="52" y="119">Once per allocated run</text>
  <text class="label" x="52" y="145">set run -&gt; constants -&gt; translation table -&gt; /run/beamOn N</text>
  <rect class="panel-dashed" x="30" y="184" width="940" height="244" rx="6" />
  <text class="heading" x="50" y="213">Repeated for every event</text>
  <rect class="blue" x="55" y="245" width="145" height="128" rx="6" />
  <text class="heading" x="73" y="269">1</text>
  <text class="heading center" x="127.5" y="298">Primary generator</text>
  <text class="small center" x="127.5" y="323">
    <tspan x="127.5">sample particles and</tspan>
    <tspan x="127.5" dy="15">create vertices</tspan>
  </text>
  <line class="arrow" x1="204" y1="309" x2="233" y2="309" />
  <rect class="violet" x="238" y="245" width="145" height="128" rx="6" />
  <text class="heading" x="256" y="269">2</text>
  <text class="heading center" x="310.5" y="298">Geant4 transport</text>
  <text class="small center" x="310.5" y="323">
    <tspan x="310.5">tracks, processes,</tspan>
    <tspan x="310.5" dy="15">and detector steps</tspan>
  </text>
  <line class="arrow" x1="387" y1="309" x2="416" y2="309" />
  <rect class="red" x="421" y="245" width="145" height="128" rx="6" />
  <text class="heading" x="439" y="269">3</text>
  <text class="heading center" x="493.5" y="298">Sensitive detector</text>
  <text class="small center" x="493.5" y="323">
    <tspan x="493.5">key and accumulate</tspan>
    <tspan x="493.5" dy="15">steps into GHit</tspan>
  </text>
  <line class="arrow" x1="570" y1="309" x2="599" y2="309" />
  <rect class="gold" x="604" y="245" width="145" height="128" rx="6" />
  <text class="heading" x="622" y="269">4</text>
  <text class="heading center" x="676.5" y="298">Digitization</text>
  <text class="small center" x="676.5" y="323">
    <tspan x="676.5">apply constants,</tspan>
    <tspan x="676.5" dy="15">response, and</tspan>
    <tspan x="676.5" dy="15">electronics</tspan>
  </text>
  <line class="arrow" x1="753" y1="309" x2="782" y2="309" />
  <rect class="green" x="787" y="245" width="145" height="128" rx="6" />
  <text class="heading" x="805" y="269">5</text>
  <text class="heading center" x="859.5" y="298">Streamer</text>
  <text class="small center" x="859.5" y="323">
    <tspan x="859.5">publish headers,</tspan>
    <tspan x="859.5" dy="15">truth, and digitized</tspan>
    <tspan x="859.5" dy="15">banks</tspan>
  </text>
  <path class="arrow" d="M 860 386 C 860 420 125 420 125 385" />
  <text class="small center" x="500" y="454">next event until this run's assigned count is complete</text>
</svg>
