<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" role="img" aria-labelledby="title desc">
  <title id="title">Magnetic-field installation</title>
  <desc id="desc">A five-stage workflow for the gfields module.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#7d8590" />
    </marker>
    <style>.background { fill: #ffffff; }
.title { fill: #1f2328; font: 700 23px Avenir, "Segoe UI", Arial, sans-serif; }
.description { fill: #59636e; font: 13px Avenir, "Segoe UI", Arial, sans-serif; }
.node { stroke-width: 1.5; }
.node.input { fill: #e8f1ff; stroke: #1d6ff2; }
.node.core { fill: #f0f2f4; stroke: #66717d; }
.node.plugin { fill: #fff3d6; stroke: #b77900; }
.node.action { fill: #ffe9e5; stroke: #c2412d; }
.node.output { fill: #e3f7ea; stroke: #238636; }
.step-number { fill: #ffffff; stroke-width: 1.5; }
.step-number.input { stroke: #1d6ff2; }
.step-number.core { stroke: #66717d; }
.step-number.plugin { stroke: #b77900; }
.step-number.action { stroke: #c2412d; }
.step-number.output { stroke: #238636; }
.number { fill: #1f2328; font: 700 12px Avenir, "Segoe UI", Arial, sans-serif; text-anchor: middle; }
.node-title { fill: #1f2328; font: 700 14px Avenir, "Segoe UI", Arial, sans-serif; text-anchor: middle; }
.node-detail { fill: #59636e; font: 11.5px Avenir, "Segoe UI", Arial, sans-serif; text-anchor: middle; }
.connector { fill: none; stroke: #7d8590; stroke-width: 2; marker-end: url(#arrow); }
.legend-text { fill: #59636e; font: 11px Avenir, "Segoe UI", Arial, sans-serif; }
.legend.input { fill: #e8f1ff; stroke: #1d6ff2; }
.legend.core { fill: #f0f2f4; stroke: #66717d; }
.legend.plugin { fill: #fff3d6; stroke: #b77900; }
.legend.action { fill: #ffe9e5; stroke: #c2412d; }
.legend.output { fill: #e3f7ea; stroke: #238636; }
@media (prefers-color-scheme: dark) {
  .background { fill: #0d1117; }
  .title, .number, .node-title { fill: #e6edf3; }
  .description, .node-detail, .legend-text { fill: #9da7b3; }
  .node.input { fill: #15243a; stroke: #58a6ff; }
  .node.core { fill: #21262d; stroke: #8b949e; }
  .node.plugin { fill: #352b18; stroke: #d29922; }
  .node.action { fill: #3a211d; stroke: #f47067; }
  .node.output { fill: #173326; stroke: #3fb950; }
  .step-number { fill: #0d1117; }
  .connector { stroke: #8b949e; }
  .legend.input { fill: #15243a; stroke: #58a6ff; }
  .legend.core { fill: #21262d; stroke: #8b949e; }
  .legend.plugin { fill: #352b18; stroke: #d29922; }
  .legend.action { fill: #3a211d; stroke: #f47067; }
  .legend.output { fill: #173326; stroke: #3fb950; }
}</style>
  </defs>
  <rect class="background" width="1000" height="320" />
  <text class="title" x="30" y="38">Magnetic-field installation</text>
  <text class="description" x="30" y="64">
    <tspan x="30">Field definitions become plugin instances and Geant4 field managers.</tspan>
  </text>
  <path class="connector" d="M 190 166 L 218 166" />
  <path class="connector" d="M 386 166 L 414 166" />
  <path class="connector" d="M 582 166 L 610 166" />
  <path class="connector" d="M 778 166 L 806 166" />
  <g>
    <rect class="node input" x="30" y="104" width="156" height="124" rx="6" />
    <circle class="step-number input" cx="50" cy="124" r="11" />
    <text class="number" x="50" y="128">1</text>
    <text class="node-title" x="108" y="148">
      <tspan x="108">Field options</tspan>
    </text>
    <text class="node-detail" x="108" y="188">
      <tspan x="108">Named parameters,</tspan>
      <tspan x="108" dy="15">units, axes, and</tspan>
      <tspan x="108" dy="15">integration</tspan>
    </text>
  </g>
  <g>
    <rect class="node core" x="226" y="104" width="156" height="124" rx="6" />
    <circle class="step-number core" cx="246" cy="124" r="11" />
    <text class="number" x="246" y="128">2</text>
    <text class="node-title" x="304" y="148">
      <tspan x="304">Field definition</tspan>
    </text>
    <text class="node-detail" x="304" y="188">
      <tspan x="304">Normalize configuration</tspan>
      <tspan x="304" dy="15">for a plugin</tspan>
    </text>
  </g>
  <g>
    <rect class="node plugin" x="422" y="104" width="156" height="124" rx="6" />
    <circle class="step-number plugin" cx="442" cy="124" r="11" />
    <text class="number" x="442" y="128">3</text>
    <text class="node-title" x="500" y="148">
      <tspan x="500">Field factory</tspan>
    </text>
    <text class="node-detail" x="500" y="188">
      <tspan x="500">Load and initialize the</tspan>
      <tspan x="500" dy="15">concrete field</tspan>
    </text>
  </g>
  <g>
    <rect class="node action" x="618" y="104" width="156" height="124" rx="6" />
    <circle class="step-number action" cx="638" cy="124" r="11" />
    <text class="number" x="638" y="128">4</text>
    <text class="node-title" x="696" y="148">
      <tspan x="696">Field manager</tspan>
    </text>
    <text class="node-detail" x="696" y="188">
      <tspan x="696">Create equation,</tspan>
      <tspan x="696" dy="15">stepper, and chord</tspan>
      <tspan x="696" dy="15">finder</tspan>
    </text>
  </g>
  <g>
    <rect class="node output" x="814" y="104" width="156" height="124" rx="6" />
    <circle class="step-number output" cx="834" cy="124" r="11" />
    <text class="number" x="834" y="128">5</text>
    <text class="node-title" x="892" y="148">
      <tspan x="892">Volume attachment</tspan>
    </text>
    <text class="node-detail" x="892" y="188">
      <tspan x="892">Evaluate the field</tspan>
      <tspan x="892" dy="15">during particle</tspan>
      <tspan x="892" dy="15">transport</tspan>
    </text>
  </g>
  <rect class="legend input" x="166" y="274" width="13" height="13" rx="2" />
  <text class="legend-text" x="186" y="285">Input</text>
  <rect class="legend core" x="301" y="274" width="13" height="13" rx="2" />
  <text class="legend-text" x="321" y="285">Core</text>
  <rect class="legend plugin" x="436" y="274" width="13" height="13" rx="2" />
  <text class="legend-text" x="456" y="285">Extension</text>
  <rect class="legend action" x="571" y="274" width="13" height="13" rx="2" />
  <text class="legend-text" x="591" y="285">Action</text>
  <rect class="legend output" x="706" y="274" width="13" height="13" rx="2" />
  <text class="legend-text" x="726" y="285">Output</text>
</svg>
