<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" role="img" aria-label="GEMC digitization plugin hooks">
  <title>GEMC — Digitization plugin hooks</title>
  <defs>
    <style>
      :root {
        color-scheme: light dark;
        --bg:            #f2f2f7;
        --band-a:        #ffffff;
        --band-b:        #ececf1;
        --ink:           #1c1c1e;
        --muted:         #6e6e73;
        --routine:       #e3efff;
        --routine-stroke:#1a50c0;
        --gate:          #fff3d6;
        --gate-stroke:   #d99a00;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg:            #1c1c1e;
          --band-a:        #2c2c2e;
          --band-b:        #242426;
          --ink:           #f2f2f7;
          --muted:         #aeaeb2;
          --routine:       #25324a;
          --routine-stroke:#6f9bff;
          --gate:          #3a3320;
          --gate-stroke:   #d9a300;
        }
      }
      text { font-family: Avenir, "Segoe UI", Arial, sans-serif; }
      .h1          { fill: var(--ink);   font-size: 21px; font-weight: 700; }
      .sub         { fill: var(--muted); font-size: 12.5px; }
      .band-a      { fill: var(--band-a); }
      .band-b      { fill: var(--band-b); }
      .lane-label  { fill: var(--ink);   font-size: 14.5px; font-weight: 700; }
      .lane-when   { fill: var(--muted); font-size: 10px; }
      .routine-box { fill: var(--routine); stroke: var(--routine-stroke); stroke-width: 1.4; }
      .gate-box    { fill: var(--gate);    stroke: var(--gate-stroke);    stroke-width: 1.4; }
      .box-title   { fill: var(--ink);   font-size: 12.5px; font-weight: 600; text-anchor: middle; }
      .box-sub     { fill: var(--muted); font-size: 10.5px; text-anchor: middle; }
      .leg-text    { fill: var(--ink);   font-size: 11.5px; }
    </style>
  </defs>

  <rect x="0" y="0" width="940" height="600" fill="var(--bg)"/>

  <!-- Header -->
  <text class="h1"  x="24" y="34">Digitization plugin hooks</text>
  <text class="sub" x="24" y="55">The GDynamicDigitization methods a .gplugin overrides, by lifecycle phase</text>

  <!-- Lane 1 — Construction -->
  <rect class="band-a" x="14" y="70" width="912" height="82" rx="10"/>
  <text class="lane-label" x="26" y="106">Construction</text>
  <text class="lane-when"  x="26" y="122">once per thread</text>
  <rect class="routine-box" x="250" y="90" width="270" height="46" rx="8"/>
  <text class="box-title" x="385" y="112">defineReadoutSpecsImpl()</text>
  <text class="box-sub"   x="385" y="127">electronics timing model — required</text>

  <!-- Lane 2 — Begin of run -->
  <rect class="band-b" x="14" y="158" width="912" height="82" rx="10"/>
  <text class="lane-label" x="26" y="194">Begin of run</text>
  <text class="lane-when"  x="26" y="210">run number changes</text>
  <rect class="routine-box" x="250" y="178" width="215" height="46" rx="8"/>
  <text class="box-title" x="357" y="200">loadConstantsImpl()</text>
  <text class="box-sub"   x="357" y="215">calibration constants</text>
  <rect class="routine-box" x="485" y="178" width="215" height="46" rx="8"/>
  <text class="box-title" x="592" y="200">loadTTImpl()</text>
  <text class="box-sub"   x="592" y="215">identity → electronics address</text>

  <!-- Lane 3 — Stepping -->
  <rect class="band-a" x="14" y="246" width="912" height="82" rx="10"/>
  <text class="lane-label" x="26" y="282">Stepping</text>
  <text class="lane-when"  x="26" y="298">every step</text>
  <rect class="routine-box" x="250" y="266" width="205" height="46" rx="8"/>
  <text class="box-title" x="352" y="288">decisionToSkipHit()</text>
  <text class="box-sub"   x="352" y="303">skip zero-edep step</text>
  <rect class="routine-box" x="475" y="266" width="225" height="46" rx="8"/>
  <text class="box-title" x="587" y="288">processTouchableImpl()</text>
  <text class="box-sub"   x="587" y="303">split · charge · time bins</text>

  <!-- Lane 4 — End of event -->
  <rect class="band-b" x="14" y="334" width="912" height="118" rx="10"/>
  <text class="lane-label" x="26" y="388">End of event</text>
  <text class="lane-when"  x="26" y="404">per hit</text>

  <rect class="routine-box" x="132" y="370" width="180" height="46" rx="8"/>
  <text class="box-title" x="222" y="392">digitizeHitImpl()</text>
  <text class="box-sub"   x="222" y="407">the digitized bank</text>

  <rect class="gate-box" x="320" y="370" width="196" height="46" rx="8"/>
  <text class="box-title" x="418" y="392">apply_thresholds_impl()</text>
  <text class="box-sub"   x="418" y="407">below threshold? → drop</text>

  <rect class="gate-box" x="524" y="370" width="196" height="46" rx="8"/>
  <text class="box-title" x="622" y="392">apply_efficiency_impl()</text>
  <text class="box-sub"   x="622" y="407">fails efficiency? → drop</text>

  <rect class="routine-box" x="728" y="370" width="184" height="46" rx="8"/>
  <text class="box-title" x="820" y="392">collectTrue…Impl()</text>
  <text class="box-sub"   x="820" y="407">Monte-Carlo truth bank</text>

  <text class="lane-when" x="320" y="438">apply_thresholds_impl / apply_efficiency_impl run only when the system is listed in</text>
  <text class="lane-when" x="320" y="449">-applyThresholds / -applyInefficiencies (both off by default); return true to drop the hit.</text>

  <!-- Lane 5 — Output -->
  <rect class="band-a" x="14" y="458" width="912" height="78" rx="10"/>
  <text class="lane-label" x="26" y="494">Output</text>
  <text class="lane-when"  x="26" y="510">per event / end of run</text>
  <rect class="routine-box" x="250" y="474" width="230" height="46" rx="8"/>
  <text class="box-title" x="365" y="496">normalizeImpl()</text>
  <text class="box-sub"   x="365" y="511">run-mode integrated output</text>

  <!-- Legend -->
  <rect class="routine-box" x="250" y="560" width="14" height="14" rx="3"/>
  <text class="leg-text" x="270" y="571">Override hook</text>
  <rect class="gate-box" x="430" y="560" width="14" height="14" rx="3"/>
  <text class="leg-text" x="450" y="571">Rejection hook — return true to drop the hit</text>
</svg>
