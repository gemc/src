  <line class="arrow" x1="168" y1="180" x2="165" y2="158" />
  <line class="arrow" x1="236" y1="180" x2="235" y2="158" />
  <line class="arrow" x1="304" y1="180" x2="305" y2="158" />
  <line class="arrow" x1="372" y1="180" x2="375" y2="158" />
  <line class="arrow" x1="440" y1="180" x2="445" y2="158" />
  <line class="arrow" x1="508" y1="180" x2="515" y2="158" />
  <line class="arrow" x1="100" y1="230" x2="95" y2="204" />
  <line class="arrow" x1="168" y1="230" x2="165" y2="204" />
  <line class="arrow" x1="236" y1="230" x2="235" y2="204" />
  <line class="arrow" x1="304" y1="230" x2="305" y2="204" />
  <line class="arrow" x1="372" y1="230" x2="375" y2="204" />
  <line class="arrow" x1="440" y1="230" x2="445" y2="204" />
  <line class="arrow" x1="508" y1="230" x2="515" y2="204" />
  <line class="arrow" x1="100" y1="280" x2="95" y2="250" />
  <line class="arrow" x1="168" y1="280" x2="165" y2="250" />
  <line class="arrow" x1="236" y1="280" x2="235" y2="250" />
  <line class="arrow" x1="304" y1="280" x2="305" y2="250" />
  <line class="arrow" x1="372" y1="280" x2="375" y2="250" />
  <line class="arrow" x1="440" y1="280" x2="445" y2="250" />
  <line class="arrow" x1="508" y1="280" x2="515" y2="250" />
  <line class="arrow" x1="100" y1="330" x2="95" y2="296" />
  <line class="arrow" x1="168" y1="330" x2="165" y2="296" />
  <line class="arrow" x1="236" y1="330" x2="235" y2="296" />
  <line class="arrow" x1="304" y1="330" x2="305" y2="296" />
  <line class="arrow" x1="372" y1="330" x2="375" y2="296" />
  <line class="arrow" x1="440" y1="330" x2="445" y2="296" />
  <line class="arrow" x1="508" y1="330" x2="515" y2="296" />
  <circle class="red" cx="305" cy="253" r="7" />
  <text class="small" x="318" y="258">configured origin</text>
  <text class="label" x="92" y="386">B(x, y, z)</text>
  <text class="small end" x="548" y="386">arrow direction = field direction; length = magnitude</text>
  <rect class="panel" x="610" y="90" width="360" height="315" rx="6" />
  <text class="heading" x="635" y="122">Runtime attachment</text>
  <rect class="blue" x="635" y="145" width="310" height="47" rx="6" />
  <text class="heading" x="651" y="166">GFieldDefinition</text>
  <text class="tiny end" x="929" y="166">name, plugin, strength</text>
  <line class="arrow" x1="790" y1="194" x2="790" y2="205" />
  <rect class="violet" x="635" y="207" width="310" height="47" rx="6" />
  <text class="heading" x="651" y="228">GField plugin</text>
  <text class="tiny end" x="929" y="228">evaluate field vector</text>
  <line class="arrow" x1="790" y1="256" x2="790" y2="267" />
  <rect class="gold" x="635" y="269" width="310" height="47" rx="6" />
  <text class="heading" x="651" y="290">G4FieldManager</text>
  <text class="tiny end" x="929" y="290">stepper + chord finder</text>
  <line class="arrow" x1="790" y1="318" x2="790" y2="329" />
  <rect class="green" x="635" y="331" width="310" height="47" rx="6" />
  <text class="heading" x="651" y="352">Logical volume</text>
  <text class="tiny end" x="929" y="352">transport uses the field</text>
</svg>
