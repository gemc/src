<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" role="img" aria-labelledby="title desc">
  <title id="title">Run-weight sampling example</title>
  <desc id="desc">
Relative weights define cumulative random intervals; integer event counts
fluctuate stochastically.
  </desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5">
      <polygon points="0 0, 9 3.5, 0 7" fill="#66717d" />
    </marker>
    <style>.background { fill: #ffffff; }
.panel { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
.panel-dashed { fill: #f6f8fa; stroke: #8c959f; stroke-dasharray: 7 5; stroke-width: 1.5; }
.title { fill: #1f2328; font: 700 23px Avenir, "Segoe UI", Arial, sans-serif; }
.subtitle { fill: #59636e; font: 13px Avenir, "Segoe UI", Arial, sans-serif; }
.heading { fill: #1f2328; font: 700 15px Avenir, "Segoe UI", Arial, sans-serif; }
.label { fill: #1f2328; font: 13px Avenir, "Segoe UI", Arial, sans-serif; }
.small { fill: #59636e; font: 11.5px Avenir, "Segoe UI", Arial, sans-serif; }
.tiny { fill: #59636e; font: 10.5px Avenir, "Segoe UI", Arial, sans-serif; }
.center { text-anchor: middle; }
.end { text-anchor: end; }
.axis { fill: none; stroke: #66717d; stroke-width: 1.5; }
.grid { fill: none; stroke: #d0d7de; stroke-width: 1; }
.arrow { fill: none; stroke: #66717d; stroke-width: 2; marker-end: url(#arrow); }
.blue { fill: #dbeafe; stroke: #1d6ff2; stroke-width: 1.5; }
.green { fill: #dcfce7; stroke: #238636; stroke-width: 1.5; }
.gold { fill: #fff3cd; stroke: #b77900; stroke-width: 1.5; }
.red { fill: #ffe4e0; stroke: #c2412d; stroke-width: 1.5; }
.violet { fill: #eee5ff; stroke: #8250df; stroke-width: 1.5; }
.blue-line { fill: none; stroke: #1d6ff2; stroke-width: 3; }
.green-line { fill: none; stroke: #238636; stroke-width: 3; }
.gold-line { fill: none; stroke: #b77900; stroke-width: 3; }
.red-line { fill: none; stroke: #c2412d; stroke-width: 3; }
.muted-line { fill: none; stroke: #8c959f; stroke-width: 1.5; stroke-dasharray: 5 4; }
.table-head { fill: #eaeef2; stroke: #afb8c1; stroke-width: 1; }
.table-cell { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
@media (prefers-color-scheme: dark) {
  .background { fill: #0d1117; }
  .panel, .panel-dashed { fill: #161b22; stroke: #30363d; }
  .title, .heading, .label { fill: #e6edf3; }
  .subtitle, .small, .tiny { fill: #9da7b3; }
  .axis, .arrow { stroke: #8b949e; }
  .grid { stroke: #30363d; }
  .blue { fill: #15243a; stroke: #58a6ff; }
  .green { fill: #173326; stroke: #3fb950; }
  .gold { fill: #352b18; stroke: #d29922; }
  .red { fill: #3a211d; stroke: #f47067; }
  .violet { fill: #2d2340; stroke: #a371f7; }
  .table-head { fill: #21262d; stroke: #484f58; }
  .table-cell { fill: #161b22; stroke: #30363d; }
}</style>
  </defs>
  <rect class="background" width="1000" height="450" />
  <text class="title" x="30" y="38">Run-weight sampling example</text>
  <text class="subtitle" x="30" y="64">
    <tspan x="30">Relative weights define cumulative random intervals; integer event counts</tspan>
    <tspan x="30" dy="15">fluctuate stochastically.</tspan>
  </text>
  <rect class="panel" x="30" y="90" width="390" height="310" rx="6" />
  <text class="heading" x="52" y="120">weights.txt</text>
  <text class="small" x="52" y="153">Run</text>
  <text class="small" x="155" y="153">Weight</text>
  <text class="small" x="270" y="153">Normalized</text>
  <text class="small end" x="390" y="153">Expected</text>
  <rect class="table-cell" x="48" y="161" width="350" height="34" rx="0" />
  <text class="label" x="52" y="184">11</text>
  <text class="label" x="155" y="184">1</text>
  <text class="label" x="270" y="184">0.10</text>
  <text class="label end" x="390" y="184">10</text>
  <rect class="table-cell" x="48" y="205" width="350" height="34" rx="0" />
  <text class="label" x="52" y="228">12</text>
  <text class="label" x="155" y="228">7</text>
  <text class="label" x="270" y="228">0.70</text>
  <text class="label end" x="390" y="228">70</text>
  <rect class="table-cell" x="48" y="249" width="350" height="34" rx="0" />
  <text class="label" x="52" y="272">13</text>
  <text class="label" x="155" y="272">2</text>
  <text class="label" x="270" y="272">0.20</text>
  <text class="label end" x="390" y="272">20</text>
  <text class="heading" x="52" y="329">total</text>
  <text class="heading" x="155" y="329">10</text>
  <text class="heading" x="270" y="329">1.00</text>
  <text class="heading end" x="390" y="329">100</text>
  <text class="small" x="52" y="363">
    <tspan x="52">Expected counts describe the long-run ratio, not</tspan>
    <tspan x="52" dy="15">a guaranteed allocation.</tspan>
  </text>
  <rect class="panel" x="445" y="90" width="525" height="310" rx="6" />
  <text class="heading" x="470" y="120">Cumulative selection intervals</text>
  <text class="small end" x="945" y="120">draw = U(0, total weight)</text>
  <rect class="blue" x="470" y="157" width="47" height="78" rx="2" />
  <text class="heading center" x="493.5" y="188">run 11</text>
  <text class="small center" x="493.5" y="215">0-1</text>
  <rect class="gold" x="517" y="157" width="329" height="78" rx="2" />
  <text class="heading center" x="681.5" y="188">run 12</text>
  <text class="small center" x="681.5" y="215">1-8</text>
  <rect class="green" x="846" y="157" width="94" height="78" rx="2" />
  <text class="heading center" x="893" y="188">run 13</text>
  <text class="small center" x="893" y="215">8-10</text>
  <text class="small center" x="470" y="254">0</text>
  <text class="small center" x="517" y="254">1</text>
  <text class="small center" x="846" y="254">8</text>
  <text class="small center" x="940" y="254">10</text>
  <line class="arrow" x1="493" y1="278" x2="493" y2="316" />
  <line class="arrow" x1="681" y1="278" x2="681" y2="316" />
  <line class="arrow" x1="893" y1="278" x2="893" y2="316" />
  <text class="small center" x="493" y="345">about 10%</text>
  <text class="small center" x="681" y="345">about 70%</text>
  <text class="small center" x="893" y="345">about 20%</text>
  <text class="label center" x="707" y="380">Every draw increments exactly one run counter.</text>
</svg>
