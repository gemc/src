  <text x="197" y="176" class="ui-label">Scale</text>
  <rect x="250" y="158" width="24" height="24" rx="4" fill="#e6e6e6" stroke="var(--border)" stroke-width="1"/>
  <rect x="340" y="164" width="14" height="14" rx="2" class="check"/>
  <text x="363" y="176" class="ui-label">Axes</text>
  <rect x="174" y="206" width="14" height="14" rx="2" class="check"/>
  <text x="197" y="218" class="ui-label">Event ID</text>
  <rect x="278" y="199" width="58" height="24" rx="4" class="input-box"/>
  <text x="307" y="216" class="ui-label" text-anchor="middle">24</text>
  <rect x="390" y="206" width="14" height="14" rx="2" class="check"/>
  <text x="413" y="218" class="ui-label">Date</text>
  <rect x="472" y="199" width="58" height="24" rx="4" class="input-box"/>
  <text x="501" y="216" class="ui-label" text-anchor="middle">24</text>
  <rect x="174" y="248" width="14" height="14" rx="2" class="check"/>
  <text x="197" y="260" class="ui-label">Logo 2D</text>
  <rect x="340" y="248" width="14" height="14" rx="2" class="check"/>
  <text x="363" y="260" class="ui-label">Logo 3D</text>
  <rect x="174" y="290" width="14" height="14" rx="2" class="check"/>
  <text x="197" y="302" class="ui-label">Frame</text>
  <rect x="250" y="284" width="24" height="24" rx="4" fill="#d64235" stroke="var(--border)" stroke-width="1"/>

  <text x="585" y="176" class="ui-label">Scale Length:</text>
  <rect x="690" y="158" width="128" height="24" rx="4" class="input-box"/>
  <text x="754" y="176" class="ui-label" text-anchor="middle">10</text>
  <text x="585" y="218" class="ui-label">Scale Unit:</text>
  <rect x="690" y="200" width="128" height="24" rx="4" class="input-box"/>
  <text x="754" y="218" class="ui-label" text-anchor="middle">mm</text>
  <text x="585" y="260" class="ui-label">Scale Direction:</text>
  <rect x="690" y="242" width="128" height="24" rx="4" class="input-box"/>
  <text x="754" y="260" class="ui-label" text-anchor="middle">z</text>
  <text x="585" y="302" class="ui-label">Frame Line Width:</text>
  <rect x="720" y="284" width="98" height="24" rx="4" class="input-box"/>
  <text x="769" y="302" class="ui-label" text-anchor="middle">2.0</text>
  <rect x="690" y="334" width="178" height="30" rx="6" class="topbar-btn"/>
  <text x="779" y="354" text-anchor="middle" class="ui-label">Apply Decorations</text>

  <rect x="150" y="416" width="786" height="210" rx="7" class="section-box"/>
  <text x="170" y="442" class="sec-title">Scene Text</text>
  <text x="176" y="476" class="ui-label">Kind:</text>
  <rect x="228" y="458" width="86" height="24" rx="4" class="input-box"/>
  <text x="271" y="476" text-anchor="middle" class="ui-label">2D</text>
  <text x="176" y="518" class="ui-label">Text:</text>
  <rect x="228" y="500" width="250" height="24" rx="4" class="input-box"/>
  <text x="248" y="518" class="ui-small">Text</text>
  <rect x="488" y="500" width="24" height="24" rx="4" fill="#111111" stroke="var(--border)" stroke-width="1"/>
  <text x="176" y="560" class="ui-label">Layout:</text>
  <rect x="228" y="542" width="118" height="24" rx="4" class="input-box"/>
  <text x="287" y="560" text-anchor="middle" class="ui-label">right</text>

  <text x="570" y="476" class="ui-label">X:</text>
  <rect x="602" y="458" width="78" height="24" rx="4" class="input-box"/>
  <text x="641" y="476" text-anchor="middle" class="ui-label">0.9</text>
  <text x="710" y="476" class="ui-label">Y:</text>
  <rect x="742" y="458" width="78" height="24" rx="4" class="input-box"/>
  <text x="781" y="476" text-anchor="middle" class="ui-label">-0.9</text>
  <text x="570" y="518" class="ui-label">Z:</text>
  <rect x="602" y="500" width="78" height="24" rx="4" class="input-box"/>
  <text x="641" y="518" text-anchor="middle" class="ui-label">0.0</text>
  <text x="710" y="518" class="ui-label">Size:</text>
  <rect x="762" y="500" width="58" height="24" rx="4" class="input-box"/>
  <text x="791" y="518" text-anchor="middle" class="ui-label">24</text>
  <text x="570" y="560" class="ui-label">Unit:</text>
  <rect x="602" y="542" width="78" height="24" rx="4" class="input-box"/>
  <text x="641" y="560" text-anchor="middle" class="ui-label">cm</text>
  <rect x="228" y="584" width="120" height="30" rx="6" class="topbar-btn"/>
  <text x="288" y="604" text-anchor="middle" class="ui-label">Add Text</text>
  <rect x="364" y="584" width="120" height="30" rx="6" class="topbar-btn"/>
  <text x="424" y="604" text-anchor="middle" class="ui-label">Clear Text</text>

  <rect x="612" y="92" width="180" height="28" rx="5" class="ann-box"/>
  <text x="702" y="111" class="ann-text">Utilities tab</text>
  <line x1="650" y1="106" x2="585" y2="76" class="ann-line"/>
  <rect x="318" y="330" width="202" height="28" rx="5" class="ann-box"/>
  <text x="419" y="349" class="ann-text">Scene decorations</text>
  <line x1="520" y1="344" x2="690" y2="344" class="ann-line"/>
  <rect x="608" y="632" width="180" height="28" rx="5" class="ann-box"/>
  <text x="698" y="651" class="ann-text">Add annotation text</text>
  <line x1="608" y1="642" x2="480" y2="518" class="ann-line"/>
</svg>
