<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-labelledby="title desc">
  <title id="title">Configuration precedence and updates</title>
  <desc id="desc">
Defaults establish a complete schema, YAML supplies a baseline, and command-line
values override it.
  </desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5">
      <polygon points="0 0, 9 3.5, 0 7" fill="#66717d" />
    </marker>
    <style>.background { fill: #ffffff; }
.panel { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1.5; }
.panel-dashed { fill: #f6f8fa; stroke: #8c959f; stroke-dasharray: 7 5; stroke-width: 1.5; }
.title { fill: #1f2328; font: 700 23px Avenir, "Segoe UI", Arial, sans-serif; }
.subtitle { fill: #59636e; font: 13px Avenir, "Segoe UI", Arial, sans-serif; }
.heading { fill: #1f2328; font: 700 15px Avenir, "Segoe UI", Arial, sans-serif; }
.label { fill: #1f2328; font: 13px Avenir, "Segoe UI", Arial, sans-serif; }
.small { fill: #59636e; font: 11.5px Avenir, "Segoe UI", Arial, sans-serif; }
.tiny { fill: #59636e; font: 10.5px Avenir, "Segoe UI", Arial, sans-serif; }
.center { text-anchor: middle; }
.end { text-anchor: end; }
.axis { fill: none; stroke: #66717d; stroke-width: 1.5; }
.grid { fill: none; stroke: #d0d7de; stroke-width: 1; }
.arrow { fill: none; stroke: #66717d; stroke-width: 2; marker-end: url(#arrow); }
.blue { fill: #dbeafe; stroke: #1d6ff2; stroke-width: 1.5; }
.green { fill: #dcfce7; stroke: #238636; stroke-width: 1.5; }
.gold { fill: #fff3cd; stroke: #b77900; stroke-width: 1.5; }
.red { fill: #ffe4e0; stroke: #c2412d; stroke-width: 1.5; }
.violet { fill: #eee5ff; stroke: #8250df; stroke-width: 1.5; }
.blue-line { fill: none; stroke: #1d6ff2; stroke-width: 3; }
.green-line { fill: none; stroke: #238636; stroke-width: 3; }
.gold-line { fill: none; stroke: #b77900; stroke-width: 3; }
.red-line { fill: none; stroke: #c2412d; stroke-width: 3; }
.muted-line { fill: none; stroke: #8c959f; stroke-width: 1.5; stroke-dasharray: 5 4; }
.table-head { fill: #eaeef2; stroke: #afb8c1; stroke-width: 1; }
.table-cell { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
@media (prefers-color-scheme: dark) {
  .background { fill: #0d1117; }
  .panel, .panel-dashed { fill: #161b22; stroke: #30363d; }
  .title, .heading, .label { fill: #e6edf3; }
  .subtitle, .small, .tiny { fill: #9da7b3; }
  .axis, .arrow { stroke: #8b949e; }
  .grid { stroke: #30363d; }
  .blue { fill: #15243a; stroke: #58a6ff; }
  .green { fill: #173326; stroke: #3fb950; }
  .gold { fill: #352b18; stroke: #d29922; }
  .red { fill: #3a211d; stroke: #f47067; }
  .violet { fill: #2d2340; stroke: #a371f7; }
  .table-head { fill: #21262d; stroke: #484f58; }
  .table-cell { fill: #161b22; stroke: #30363d; }
}</style>
  </defs>
  <rect class="background" width="1000" height="440" />
  <text class="title" x="30" y="38">Configuration precedence and updates</text>
  <text class="subtitle" x="30" y="64">
    <tspan x="30">Defaults establish a complete schema, YAML supplies a baseline, and command-line</tspan>
    <tspan x="30" dy="15">values override it.</tspan>
  </text>
  <rect class="blue" x="70" y="290" width="310" height="78" rx="6" />
  <text class="heading" x="92" y="321">Schema defaults</text>
  <text class="small" x="92" y="346">complete missing optional keys</text>
  <rect class="gold" x="110" y="215" width="310" height="78" rx="6" />
  <text class="heading" x="132" y="246">YAML configuration</text>
  <text class="small" x="132" y="271">reproducible file baseline</text>
  <rect class="red" x="150" y="140" width="310" height="78" rx="6" />
  <text class="heading" x="172" y="171">Command line</text>
  <text class="small" x="172" y="196">highest-precedence updates</text>
  <line class="arrow" x1="475" y1="255" x2="560" y2="255" />
  <rect class="panel" x="580" y="112" width="360" height="270" rx="6" />
  <text class="heading" x="605" y="145">Resolved option tree</text>
  <rect class="gold" x="605" y="166" width="310" height="36" rx="3" />
  <text class="small" x="620" y="190">runno</text>
  <text class="label end" x="895" y="190">12</text>
  <rect class="red" x="605" y="212" width="310" height="36" rx="3" />
  <text class="small" x="620" y="236">verbosity.gemc</text>
  <text class="label end" x="895" y="236">2</text>
  <rect class="gold" x="605" y="258" width="310" height="36" rx="3" />
  <text class="small" x="620" y="282">gparticle[0].name</text>
  <text class="label end" x="895" y="282">e-</text>
  <rect class="red" x="605" y="304" width="310" height="36" rx="3" />
  <text class="small" x="620" y="328">gparticle[0].p</text>
  <text class="label end" x="895" y="328">5*GeV</text>
  <text class="small" x="605" y="365">validation</text>
  <text class="small end" x="915" y="365">types + mandatory keys + snapshot</text>
</svg>
