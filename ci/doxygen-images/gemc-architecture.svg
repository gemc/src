<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">GEMC database-driven simulation workflow</title>
  <desc id="desc">A five-step workflow: define detector databases, build Geant4 objects, transport particles to create hits, digitize hits with electronics emulation, and stream output data.</desc>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --ink: #101820;
      --muted: #536271;
      --outline: #17202a;
      --arrow: #d8ecf7;
      --shadow: rgba(15, 23, 42, 0.18);
      --define: #b9d2ec;
      --build: #f6b4ec;
      --transport: #ffc99c;
      --digitize: #6fe8e5;
      --output: #7cdda1;
      --panel: #f7f9fc;
      --panel-2: #e8e0f2;
      --panel-3: #d6c8e8;
      --dark-panel: #0f2036;
      --db-a: #0f55d6;
      --db-b: #081a4f;
      --track-red: #ff2e2e;
      --track-green: #24c95a;
      --track-cyan: #00d4e6;
      --track-yellow: #f6e84a;
      --object-red: #df1717;
      --object-green: #66d31d;
      --object-yellow: #e4db00;
      --object-blue: #8db7e8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --ink: #eef2f7;
        --muted: #b8c2cf;
        --outline: #d9e2ec;
        --arrow: #9dd7f4;
        --shadow: rgba(0, 0, 0, 0.45);
        --define: #345a82;
        --build: #7b3d79;
        --transport: #8a5a2d;
        --digitize: #168b8a;
        --output: #247447;
        --panel: #141925;
        --panel-2: #332b44;
        --panel-3: #413453;
        --dark-panel: #07101f;
        --db-a: #58a6ff;
        --db-b: #16284d;
      }
    }

    .stage-label { fill: var(--ink); font: 31px Avenir, "Segoe UI", Arial, sans-serif; font-weight: 500; }
    .panel-title { fill: var(--ink); font: 42px Avenir, "Segoe UI", Arial, sans-serif; font-weight: 800; }
    .panel-title-light { fill: #f8fafc; font: 42px Avenir, "Segoe UI", Arial, sans-serif; font-weight: 800; }
    .small { fill: var(--muted); font: 17px Avenir, "Segoe UI", Arial, sans-serif; }
    .label-box { stroke: var(--outline); stroke-width: 3; rx: 10; }
    .panel { stroke: var(--outline); stroke-width: 3; filter: url(#softShadow); }
    .arrow { fill: var(--arrow); stroke: var(--outline); stroke-width: 3; filter: url(#softShadow); }
    .wire { fill: none; stroke-width: 2; opacity: 0.72; }
    .hit { stroke-linecap: round; stroke-width: 2.4; }
  </style>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="5" stdDeviation="5" flood-color="var(--shadow)"/>
    </filter>

    <linearGradient id="dbGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="var(--db-a)"/>
      <stop offset="1" stop-color="var(--db-b)"/>
    </linearGradient>

    <linearGradient id="buildGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="var(--panel-2)"/>
      <stop offset="1" stop-color="var(--panel)"/>
    </linearGradient>

    <linearGradient id="transportGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="var(--panel-3)"/>
      <stop offset="1" stop-color="#111119"/>
    </linearGradient>

    <linearGradient id="electronicsGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#07549a"/>
      <stop offset="1" stop-color="var(--dark-panel)"/>
    </linearGradient>

    <linearGradient id="streamGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#20354b"/>
      <stop offset="1" stop-color="#081018"/>
    </linearGradient>

    <marker id="dot" markerWidth="4" markerHeight="4" refX="2" refY="2">
      <circle cx="2" cy="2" r="1.8" fill="currentColor"/>
    </marker>
  </defs>

  <rect width="1600" height="1200" fill="var(--bg)"/>

  <rect class="label-box" x="30" y="22" width="390" height="96" fill="var(--define)"/>
  <text class="stage-label" x="225" y="82" text-anchor="middle">1. Define</text>

  <rect class="label-box" x="605" y="22" width="390" height="96" fill="var(--build)"/>
  <text class="stage-label" x="800" y="82" text-anchor="middle">2. Build</text>

  <rect class="label-box" x="1180" y="22" width="390" height="96" fill="var(--transport)"/>
  <text class="stage-label" x="1375" y="82" text-anchor="middle">3. Transport</text>

  <rect class="panel" x="10" y="165" width="430" height="360" rx="18" fill="url(#dbGradient)"/>
  <text class="panel-title-light" x="225" y="235" text-anchor="middle">Detector</text>
  <text class="panel-title-light" x="225" y="287" text-anchor="middle">databases</text>
  <g opacity="0.78" transform="translate(0 -25)">
    <path class="wire" d="M75 210h70v85h85v70h105" stroke="#b9dcff"/>
    <path class="wire" d="M80 505h95v-70h90v-95h110" stroke="#d6ebff"/>
    <path class="wire" d="M70 365h70v-80h110v-55h110" stroke="#7fc2ff"/>
    <path class="wire" d="M95 240h90m-42 0v250m-58-155h210m-95-120v120m65-70v210" stroke="#8bc7ff"/>
    <g fill="none" stroke="#d7ecff" stroke-width="2">
      <rect x="112" y="255" width="135" height="95"/>
      <rect x="206" y="360" width="135" height="135"/>
      <rect x="250" y="215" width="100" height="80"/>
    </g>
    <g class="small" fill="#dbeafe">
      <text x="125" y="282">name</text>
      <text x="125" y="307">material</text>
      <text x="125" y="332">position</text>
      <text x="220" y="389">hit type</text>
      <text x="220" y="414">id</text>
      <text x="220" y="439">variation</text>
      <text x="265" y="245">run</text>
      <text x="265" y="270">system</text>
    </g>
  </g>

  <path class="arrow" d="M467 325h46v-25l46 45-46 45v-25h-46z"/>

  <rect class="panel" x="585" y="165" width="430" height="360" rx="18" fill="url(#buildGradient)"/>
  <text class="panel-title" x="800" y="235" text-anchor="middle">Geant4 Objects</text>
  <g transform="translate(625 270) scale(0.85)">
    <g transform="translate(0 96)">
      <polygon points="0,22 58,0 124,27 66,50" fill="#9fd2ff" stroke="#1d5f95" stroke-width="3"/>
      <polygon points="0,22 66,50 66,112 0,83" fill="var(--object-blue)" stroke="#1d5f95" stroke-width="3"/>
      <polygon points="66,50 124,27 124,88 66,112" fill="#5f9fd9" stroke="#1d5f95" stroke-width="3"/>
      <path d="M17 36l60 26m17-20v60" fill="none" stroke="#d9f0ff" stroke-width="2" opacity="0.65"/>
    </g>

    <g transform="translate(142 98)">
      <ellipse cx="56" cy="14" rx="56" ry="14" fill="#ff8b8b" stroke="#861313" stroke-width="3"/>
      <path d="M0 14v88c0 8 25 14 56 14s56-6 56-14V14" fill="var(--object-red)" stroke="#861313" stroke-width="3"/>
      <ellipse cx="56" cy="102" rx="56" ry="14" fill="#bd1818" stroke="#861313" stroke-width="3"/>
      <ellipse cx="56" cy="14" rx="25" ry="7" fill="#ffe66b" stroke="#861313" stroke-width="3"/>
    </g>

    <g transform="translate(286 95)">
      <polygon points="34,16 118,0 170,48 143,128 62,146 0,92" fill="var(--object-green)" stroke="#1d7527" stroke-width="3"/>
      <polygon points="34,16 92,54 118,0" fill="#9df06c" stroke="#1d7527" stroke-width="2" opacity="0.78"/>
      <polygon points="92,54 170,48 118,0" fill="#5bc949" stroke="#1d7527" stroke-width="2" opacity="0.78"/>
      <polygon points="92,54 143,128 170,48" fill="#41a83b" stroke="#1d7527" stroke-width="2" opacity="0.78"/>
      <polygon points="92,54 62,146 143,128" fill="#74d95a" stroke="#1d7527" stroke-width="2" opacity="0.78"/>
      <polygon points="34,16 0,92 92,54" fill="#7be35d" stroke="#1d7527" stroke-width="2" opacity="0.78"/>
      <polygon points="0,92 62,146 92,54" fill="#54bd44" stroke="#1d7527" stroke-width="2" opacity="0.78"/>
    </g>

    <g transform="translate(33 4)">
      <path d="M0 76 47 0l94 76z" fill="var(--object-yellow)" stroke="#7b7100" stroke-width="3"/>
      <ellipse cx="70" cy="76" rx="70" ry="16" fill="#bcb400" stroke="#7b7100" stroke-width="3"/>
      <path d="M47 0 70 76M15 70h110" fill="none" stroke="#fff47a" stroke-width="2.5" opacity="0.65"/>
    </g>

    <g transform="translate(215 0)">
      <path d="M58 0c-23 4-38 22-35 45 2 14 10 26 24 34-13 8-20 21-16 35 5 20 29 31 58 25 32-6 57-31 62-61 5-32-20-61-53-61H75C72 7 66-1 58 0z" fill="#70decf" stroke="#137c78" stroke-width="3"/>
      <path d="M45 20c27 10 55 10 85 0M26 48c40 11 82 11 123 0M44 79c26 9 58 8 91-2M48 110c22 5 45 2 71-7" fill="none" stroke="#b9fff8" stroke-width="2" opacity="0.74"/>
      <path d="M61 2c-13 31-11 73 5 132M92 16c-7 34-3 74 12 112M125 31c-8 30-18 58-43 103" fill="none" stroke="#b9fff8" stroke-width="2" opacity="0.74"/>
    </g>
  </g>

  <path class="arrow" d="M1042 325h46v-25l46 45-46 45v-25h-46z"/>

  <rect class="panel" x="1160" y="165" width="430" height="360" rx="18" fill="url(#transportGradient)"/>
  <text class="panel-title" x="1375" y="235" text-anchor="middle">Create Hits</text>
  <g transform="translate(1205 330) scale(0.78)">
    <g opacity="0.48" fill="none" stroke="#20c8ff" stroke-width="2">
      <rect x="0" y="-70" width="35" height="170" transform="skewY(-5)"/>
      <rect x="55" y="-50" width="35" height="145" transform="skewY(-5)"/>
      <rect x="105" y="-24" width="35" height="110" transform="skewY(-5)"/>
    </g>
    <g stroke-linecap="round">
      <path class="hit" d="M160 70 355 -20" stroke="var(--track-green)"/>
      <path class="hit" d="M160 70 45 -30" stroke="var(--track-red)"/>
      <path class="hit" d="M160 70 315 150" stroke="var(--track-cyan)" stroke-width="8" opacity="0.72"/>
      <path class="hit" d="M160 70 260 20" stroke="var(--track-yellow)" stroke-width="6" opacity="0.85"/>
      <path class="hit" d="M160 70 385 70" stroke="#ff3232"/>
      <path class="hit" d="M160 70 105 170" stroke="var(--track-green)"/>
    </g>
    <g stroke="#f2a51d" stroke-width="2" opacity="0.8">
      <line x1="160" y1="70" x2="70" y2="10"/>
      <line x1="160" y1="70" x2="85" y2="120"/>
      <line x1="160" y1="70" x2="230" y2="2"/>
      <line x1="160" y1="70" x2="260" y2="112"/>
      <line x1="160" y1="70" x2="145" y2="-5"/>
      <line x1="160" y1="70" x2="305" y2="32"/>
    </g>
    <g fill="var(--track-green)" opacity="0.8">
      <circle cx="52" cy="95" r="3"/><circle cx="68" cy="132" r="3"/><circle cx="92" cy="150" r="3"/>
      <circle cx="280" cy="18" r="3"/><circle cx="298" cy="35" r="3"/><circle cx="326" cy="42" r="3"/>
      <circle cx="115" cy="15" r="3"/><circle cx="132" cy="-5" r="3"/><circle cx="360" cy="88" r="3"/>
    </g>
    <g fill="var(--track-yellow)" opacity="0.9">
      <rect x="95" y="-48" width="17" height="7" transform="rotate(-10 95 -48)"/>
      <rect x="168" y="-36" width="17" height="7" transform="rotate(-10 168 -36)"/>
      <rect x="245" y="-18" width="17" height="7" transform="rotate(-10 245 -18)"/>
      <rect x="300" y="92" width="17" height="7" transform="rotate(18 300 92)"/>
    </g>
  </g>

  <path class="arrow" d="M1258 560v46h-25l45 46 45-46h-25v-46z"/>

  <rect class="panel" x="965" y="690" width="430" height="360" rx="18" fill="url(#electronicsGradient)"/>
  <text class="panel-title-light" x="1180" y="760" text-anchor="middle">Electronics Emulation</text>
  <g transform="translate(995 780) scale(0.7)" opacity="0.56">
    <path d="M0 115h115l80-70h175l88 70h92" fill="none" stroke="#4ab9ff" stroke-width="2"/>
    <path d="M45 150h110l85-74h110l82 74h90" fill="none" stroke="#247ee8" stroke-width="2"/>
    <path d="M15 185h165l65-66h100l88 66h82" fill="none" stroke="#1b63c8" stroke-width="2"/>
    <path d="M200 115l80 55 80-55-80-55z" fill="#64d4ff" opacity="0.5" stroke="#9ee8ff" stroke-width="2"/>
    <path d="M280 60v40M250 80v32M310 80v32M227 100v28M333 100v28" stroke="#8fe5ff" stroke-width="3"/>
  </g>

  <path class="arrow" d="M844 850h-46v-25l-46 45 46 45v-25h46z"/>

  <rect class="panel" x="200" y="690" width="430" height="360" rx="18" fill="url(#streamGradient)"/>
  <text class="panel-title-light" x="415" y="760" text-anchor="middle">Data Streaming</text>
  <g transform="translate(245 795) scale(0.7)" opacity="0.72">
    <g fill="#9ee8ff">
      <rect x="0" y="58" width="45" height="55" rx="5" opacity="0.25"/>
      <rect x="395" y="58" width="45" height="55" rx="5" opacity="0.25"/>
      <path d="M185 38h58l12 12h48v95H185z" opacity="0.85"/>
      <path d="M100 80h54l12 20h-62z" opacity="0.72"/>
      <path d="M325 80h54l12 20h-62z" opacity="0.72"/>
    </g>
    <g fill="none" stroke="#9ee8ff" stroke-width="3" opacity="0.7">
      <circle cx="244" cy="145" r="42"/>
      <circle cx="244" cy="145" r="70"/>
      <ellipse cx="244" cy="145" rx="115" ry="28"/>
      <path d="M45 86h55M166 95h19M303 95h25M390 86h45" stroke-dasharray="6 13"/>
    </g>
  </g>

  <rect class="label-box" x="985" y="1097" width="390" height="96" fill="var(--digitize)"/>
  <text class="stage-label" x="1180" y="1157" text-anchor="middle">4. Digitization</text>

  <rect class="label-box" x="220" y="1097" width="390" height="96" fill="var(--output)"/>
  <text class="stage-label" x="415" y="1157" text-anchor="middle">5. Output</text>
</svg>
