<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-label="GEMC GUI Generator page">
  <title>GEMC GUI — Generator page</title>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c8200e"/>
    </marker>
    <style>
      :root {
        color-scheme: light dark;
        --bg:       #f2f2f7;
        --chrome:   #e5e5ea;
        --panel:    #ffffff;
        --section:  #e8e8ed;
        --border:   #c7c7cc;
        --ink:      #1c1c1e;
        --muted:    #6e6e73;
        --active:   #007aff;
        --input:    #ffffff;
        --ann-fill: rgba(255,255,255,0.96);
        --ann-stroke:#1a50c0;
        --ann-ink:  #0a0a0a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg:       #1c1c1e;
          --chrome:   #2c2c2e;
          --panel:    #2c2c2e;
          --section:  #3a3a3c;
          --border:   #545458;
          --ink:      #f2f2f7;
          --muted:    #aeaeb2;
          --input:    #3a3a3c;
          --ann-fill: rgba(28,28,30,0.96);
          --ann-stroke:#5b8cff;
          --ann-ink:  #f0f0f0;
        }
      }
      text { font-family: Avenir, "Segoe UI", Arial, sans-serif; }
      .ui-label   { fill: var(--ink);   font-size: 11px; }
      .ui-small   { fill: var(--muted); font-size: 10px; }
      .title      { fill: var(--ink);   font-size: 22px; font-weight: 700; }
      .group-title{ fill: var(--ink);   font-size: 13px; font-weight: 700; }
      .topbar-btn { fill: var(--chrome); stroke: var(--border); stroke-width: 1; }
      .page-btn   { fill: var(--chrome); stroke: var(--border); stroke-width: 1; }
      .page-active{ fill: var(--active); }
      .section-box{ fill: var(--section); stroke: var(--border); stroke-width: 1; }
      .input-box  { fill: var(--input);   stroke: var(--border); stroke-width: 1; }
      .tab        { fill: var(--chrome);  stroke: var(--border); stroke-width: 1; }
      .tab-active { fill: var(--panel);   stroke: var(--border); stroke-width: 1; }
      .slider-track{ fill: var(--border); }
      .slider-thumb{ fill: var(--input);  stroke: var(--border); stroke-width: 1.5; }
      .ann-box  { fill: var(--ann-fill); stroke: var(--ann-stroke); stroke-width: 1.8; }
      .ann-text { fill: var(--ann-ink);  font-size: 11.5px; font-weight: 700; text-anchor: middle; }
      .ann-line { stroke: #c8200e; stroke-width: 2.2; fill: none; marker-end: url(#arr); }
    </style>
  </defs>

  <rect width="980" height="720" fill="var(--bg)"/>

  <rect x="0" y="0" width="980" height="50" fill="var(--chrome)"/>
  <text x="14" y="30" class="ui-label">N. Events:</text>
  <rect x="84" y="14" width="36" height="22" rx="4" class="input-box"/>
  <text x="102" y="30" class="ui-label" text-anchor="middle">1</text>
  <rect x="130" y="11" width="54" height="26" rx="6" class="topbar-btn"/>
  <text x="157" y="29" class="ui-label" text-anchor="middle">Run</text>
  <rect x="192" y="11" width="62" height="26" rx="6" class="topbar-btn"/>
  <text x="223" y="29" class="ui-label" text-anchor="middle">Cycle</text>
  <rect x="262" y="11" width="56" height="26" rx="6" class="topbar-btn"/>
  <text x="290" y="29" class="ui-label" text-anchor="middle">Stop</text>
  <text x="332" y="30" class="ui-label">Event Number: 0</text>
  <rect x="904" y="11" width="62" height="26" rx="6" class="topbar-btn"/>
  <text x="935" y="29" class="ui-label" text-anchor="middle">Exit</text>

  <rect x="0" y="50" width="112" height="670" fill="var(--chrome)" stroke="var(--border)" stroke-width="0.5"/>

  <!-- Display — icon: src/gui/images/buttons/display_1.svg -->
  <rect x="11" y="60" width="90" height="90" rx="10" class="page-btn"/>
  <g transform="translate(11,60) scale(1.875)" style="color:var(--muted)">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <rect x="14" y="12" width="20" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="24" y1="24" x2="24" y2="29" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">Display</text>
  </g>

  <!-- Setup — icon: src/gui/images/buttons/setup_1.svg -->
  <rect x="11" y="160" width="90" height="90" rx="10" class="page-btn"/>
  <g transform="translate(11,160) scale(1.875)" style="color:var(--muted)">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <rect x="10.5" y="8"  width="6" height="6" fill="currentColor"/>
    <rect x="17.5" y="8"  width="6" height="6" fill="currentColor"/>
    <rect x="24.5" y="8"  width="6" height="6" fill="#CCCCCC"/>
    <rect x="31.5" y="8"  width="6" height="6" fill="currentColor"/>
    <rect x="10.5" y="15" width="6" height="6" fill="currentColor"/>
    <rect x="17.5" y="15" width="6" height="6" fill="#CCCCCC"/>
    <rect x="24.5" y="15" width="6" height="6" fill="currentColor"/>
    <rect x="31.5" y="15" width="6" height="6" fill="currentColor"/>
    <rect x="10.5" y="22" width="6" height="6" fill="currentColor"/>
    <rect x="17.5" y="22" width="6" height="6" fill="currentColor"/>
    <rect x="24.5" y="22" width="6" height="6" fill="currentColor"/>
    <rect x="31.5" y="22" width="6" height="6" fill="#CCCCCC"/>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">Setup</text>
  </g>

  <!-- Volumes — icon: src/gui/images/buttons/tree_1.svg -->
  <rect x="11" y="260" width="90" height="90" rx="10" class="page-btn"/>
  <g transform="translate(11,260) scale(1.875)" style="color:var(--muted)">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="16" cy="16" rx="6" ry="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <rect x="10" y="16" width="12" height="8" fill="none" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="16" cy="24" rx="6" ry="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="28" y1="14" x2="28" y2="26" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <line x1="28" y1="18" x2="34" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <circle cx="36" cy="18" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="28" y1="22" x2="34" y2="22" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <circle cx="36" cy="22" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">Volumes</text>
  </g>

  <!-- G4Dialog — icon: src/gui/images/buttons/dialog_1.svg -->
  <rect x="11" y="360" width="90" height="90" rx="10" class="page-btn"/>
  <g transform="translate(11,360) scale(1.875)" style="color:var(--muted)">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="6" y1="12" x2="42" y2="12" stroke="currentColor" stroke-width="1"/>
    <text x="24" y="25" text-anchor="middle" fill="currentColor" font-size="10" font-family="Monaco">&gt;_</text>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">G4Dialog</text>
  </g>

  <!-- Generator (active) — icon: src/gui/images/buttons/generator_1.svg -->
  <rect x="11" y="460" width="90" height="90" rx="10" class="page-active"/>
  <g transform="translate(11,460) scale(1.875)" style="color:white">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <circle cx="17" cy="19" r="4"  stroke="currentColor" stroke-width="0.6" opacity="0.30"/>
    <circle cx="17" cy="19" r="8"  stroke="currentColor" stroke-width="0.6" opacity="0.25"/>
    <circle cx="17" cy="19" r="12" stroke="currentColor" stroke-width="0.6" opacity="0.20"/>
    <path d="M17,19 Q27,13 37,11" stroke="currentColor" stroke-width="1.1" opacity="0.60" stroke-linecap="round"/>
    <path d="M17,19 Q28,19 38,19" stroke="currentColor" stroke-width="1.1" opacity="0.60" stroke-linecap="round"/>
    <path d="M17,19 Q27,24 37,27" stroke="currentColor" stroke-width="1.1" opacity="0.55" stroke-linecap="round"/>
    <path d="M17,19 Q11,13 8,10"  stroke="currentColor" stroke-width="1.0" opacity="0.40" stroke-linecap="round"/>
    <circle cx="37" cy="11" r="1.8" fill="currentColor" opacity="0.75"/>
    <circle cx="38" cy="19" r="1.8" fill="currentColor" opacity="0.75"/>
    <circle cx="37" cy="27" r="1.8" fill="currentColor" opacity="0.65"/>
    <circle cx="8"  cy="10" r="1.6" fill="currentColor" opacity="0.50"/>
    <circle cx="17" cy="19" r="3.0" fill="currentColor" opacity="0.85"/>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="7" font-family="Arial">Generator</text>
  </g>

  <rect x="120" y="56" width="848" height="656" rx="8" fill="var(--panel)" stroke="var(--border)" stroke-width="0.5"/>
  <text x="144" y="94" class="title">Generator</text>

  <rect x="144" y="112" width="88" height="30" rx="6" class="tab-active"/>
  <text x="188" y="132" text-anchor="middle" class="ui-label">e-</text>
  <text x="218" y="132" class="ui-small">x</text>
  <rect x="236" y="112" width="48" height="30" rx="6" class="tab"/>
  <text x="260" y="132" text-anchor="middle" class="ui-label">+</text>

  <rect x="144" y="158" width="792" height="72" rx="7" class="section-box"/>
  <text x="164" y="181" class="group-title">Particle</text>
  <text x="164" y="212" class="ui-label">Particle:</text>
  <rect x="240" y="195" width="148" height="24" rx="4" class="input-box"/>
  <text x="256" y="212" class="ui-label">e-</text>
  <text x="373" y="212" class="ui-small">v</text>
  <text x="430" y="212" class="ui-label">Number of e-s per event:</text>
  <rect x="586" y="195" width="84" height="24" rx="4" class="input-box"/>
  <text x="628" y="212" class="ui-label" text-anchor="middle">1</text>

  <rect x="144" y="246" width="792" height="70" rx="7" class="section-box"/>
  <text x="164" y="269" class="group-title">Momentum</text>
  <text x="164" y="300" class="ui-label">p (MeV):</text>
  <rect x="240" y="283" width="108" height="24" rx="4" class="input-box"/>
  <text x="294" y="300" class="ui-label" text-anchor="middle">1000.00</text>
  <text x="368" y="300" class="ui-label">+/-</text>
  <rect x="398" y="283" width="108" height="24" rx="4" class="input-box"/>
  <text x="452" y="300" class="ui-label" text-anchor="middle">0.00</text>
  <text x="534" y="300" class="ui-label">model:</text>
  <rect x="584" y="283" width="132" height="24" rx="4" class="input-box"/>
  <text x="602" y="300" class="ui-label">uniform</text>
  <text x="700" y="300" class="ui-small">v</text>

  <rect x="144" y="332" width="792" height="266" rx="7" class="section-box"/>
  <text x="164" y="355" class="group-title">Angles</text>
  <text x="185" y="393" class="ui-label">theta (deg):</text>
  <rect x="282" y="376" width="104" height="24" rx="4" class="input-box"/>
  <text x="334" y="393" class="ui-label" text-anchor="middle">0.000</text>
  <rect x="282" y="404" width="320" height="5" rx="2.5" class="slider-track"/>
  <circle cx="442" cy="406.5" r="8" class="slider-thumb"/>
  <text x="230" y="439" class="ui-label">+/-</text>
  <rect x="282" y="422" width="104" height="24" rx="4" class="input-box"/>
  <text x="334" y="439" class="ui-label" text-anchor="middle">0.000</text>
  <rect x="282" y="456" width="320" height="5" rx="2.5" class="slider-track"/>
  <circle cx="282" cy="458.5" r="8" class="slider-thumb"/>
  <text x="196" y="489" class="ui-label">theta model:</text>
  <rect x="282" y="472" width="132" height="24" rx="4" class="input-box"/>
  <text x="300" y="489" class="ui-label">uniform</text>
  <text x="398" y="489" class="ui-small">v</text>
  <circle cx="788" cy="410" r="42" fill="var(--input)" stroke="var(--border)" stroke-width="1"/>
  <path d="M788,410 L830,410" stroke="#c8200e" stroke-width="2"/>

  <line x1="164" y1="508" x2="916" y2="508" stroke="var(--border)" stroke-width="1"/>
  <text x="200" y="538" class="ui-label">phi (deg):</text>
  <rect x="282" y="521" width="104" height="24" rx="4" class="input-box"/>
  <text x="334" y="538" class="ui-label" text-anchor="middle">0.000</text>
  <rect x="282" y="551" width="320" height="5" rx="2.5" class="slider-track"/>
  <circle cx="282" cy="553.5" r="8" class="slider-thumb"/>
  <text x="230" y="580" class="ui-label">+/-</text>
  <rect x="282" y="563" width="104" height="24" rx="4" class="input-box"/>
  <text x="334" y="580" class="ui-label" text-anchor="middle">0.000</text>
  <rect x="282" y="590" width="320" height="5" rx="2.5" class="slider-track"/>
  <circle cx="282" cy="592.5" r="8" class="slider-thumb"/>
  <circle cx="788" cy="552" r="42" fill="var(--input)" stroke="var(--border)" stroke-width="1"/>
  <path d="M788,552 L830,552" stroke="#c8200e" stroke-width="2"/>

  <rect x="144" y="612" width="792" height="92" rx="7" class="section-box"/>
  <text x="164" y="635" class="group-title">Vertex</text>
  <text x="183" y="662" class="ui-label">vx (cm):</text>
  <rect x="244" y="645" width="86" height="24" rx="4" class="input-box"/>
  <text x="287" y="662" class="ui-label" text-anchor="middle">0.000</text>
  <text x="342" y="662" class="ui-label">+/-</text>
  <rect x="372" y="645" width="86" height="24" rx="4" class="input-box"/>
  <text x="415" y="662" class="ui-label" text-anchor="middle">0.000</text>
  <text x="183" y="692" class="ui-label">vy/vz:</text>
  <rect x="244" y="675" width="86" height="24" rx="4" class="input-box"/>
  <text x="287" y="692" class="ui-label" text-anchor="middle">0.000</text>
  <rect x="372" y="675" width="86" height="24" rx="4" class="input-box"/>
  <text x="415" y="692" class="ui-label" text-anchor="middle">0.000</text>
  <text x="520" y="662" class="ui-label">model:</text>
  <rect x="570" y="645" width="132" height="24" rx="4" class="input-box"/>
  <text x="588" y="662" class="ui-label">uniform</text>
  <text x="686" y="662" class="ui-small">v</text>

  <rect x="300" y="62" width="174" height="28" rx="5" class="ann-box"/>
  <text x="387" y="81" class="ann-text">One tab per particle</text>
  <line x1="386" y1="90" x2="204" y2="113" class="ann-line"/>
  <rect x="678" y="88" width="148" height="28" rx="5" class="ann-box"/>
  <text x="752" y="107" class="ann-text">Add particle</text>
  <line x1="712" y1="116" x2="268" y2="126" class="ann-line"/>
  <rect x="724" y="178" width="176" height="28" rx="5" class="ann-box"/>
  <text x="812" y="197" class="ann-text">Particle and multiplicity</text>
  <line x1="724" y1="200" x2="650" y2="204" class="ann-line"/>
  <rect x="746" y="252" width="142" height="28" rx="5" class="ann-box"/>
  <text x="817" y="271" class="ann-text">Momentum spread</text>
  <line x1="746" y1="274" x2="506" y2="294" class="ann-line"/>
  <rect x="620" y="470" width="210" height="28" rx="5" class="ann-box"/>
  <text x="725" y="489" class="ann-text">Two angular coverage widgets</text>
  <line x1="760" y1="470" x2="788" y2="452" class="ann-line"/>
  <line x1="760" y1="498" x2="788" y2="510" class="ann-line"/>
  <rect x="724" y="694" width="148" height="22" rx="5" class="ann-box"/>
  <text x="798" y="710" class="ann-text">Vertex model</text>
  <line x1="724" y1="700" x2="702" y2="662" class="ann-line"/>
</svg>
